<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSU Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    margin: 0;
  }
  header {
    background-color: #c00000;
    padding: 15px;
    color: white;
    font-size: 1.4rem;
    text-align: center;
  }
  .login-box {
    width: 320px;
    margin: 60px auto;
    padding: 25px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
  }
  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
  }
  button {
    width: 100%;
    padding: 10px;
    background-color: #c00000;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 1rem;
  }
  button:hover {
    background-color: #a00000;
  }
  .error {
    color: #c00000;
    font-size: 0.9rem;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>Valdosta State University Portal</header>

<div class="login-box">
  <h3>Login</h3>
  
  <input id="user" type="text" placeholder="Username" value="Kayla55766">
  <input id="pass" type="password" placeholder="Password" value="Gigigi55766">
  <button onclick="login()">Sign In</button>
  
  <div id="error" class="error"></div>
</div>

<script>
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "Kayla55766" && p === "Gigigi55766") {
    window.location.href = "grades.html";
  } else {
    document.getElementById("error").textContent = "Invalid username or password.";
  }
}
</script>

</body>
</html>
